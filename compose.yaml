services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: unitrack
      POSTGRES_USER: unitrack
      POSTGRES_PASSWORD: unitrack
    ports:
      - "5432:5432"
    volumes:
      - unitrack-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unitrack -d unitrack"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  unitrack-pg:
