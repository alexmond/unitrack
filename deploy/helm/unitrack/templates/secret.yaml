{{- if eq (include "unitrack.createSecret" .) "true" }}
{{- /*
  Resolve the DB password once: explicit value wins, otherwise reuse the value already
  stored in the cluster (so upgrades don't rotate it), otherwise generate a fresh one.
*/ -}}
{{- $secretName := include "unitrack.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $pwKey := .Values.secret.keys.dbPassword -}}
{{- $explicit := "" -}}
{{- if .Values.postgresql.enabled -}}
{{- $explicit = .Values.postgresql.auth.password -}}
{{- else -}}
{{- $explicit = .Values.externalDatabase.password -}}
{{- end -}}
{{- $dbPassword := "" -}}
{{- if $explicit -}}
{{- $dbPassword = $explicit -}}
{{- else if and $existing $existing.data (index $existing.data $pwKey) -}}
{{- $dbPassword = (index $existing.data $pwKey | b64dec) -}}
{{- else -}}
{{- $dbPassword = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "unitrack.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.dbPassword }}: {{ $dbPassword | quote }}
  {{- if and .Values.app.github.enabled .Values.secret.githubToken }}
  {{ .Values.secret.keys.githubToken }}: {{ .Values.secret.githubToken | quote }}
  {{- end }}
  {{- if .Values.secret.mailPassword }}
  {{ .Values.secret.keys.mailPassword }}: {{ .Values.secret.mailPassword | quote }}
  {{- end }}
{{- end }}
