apiVersion: v1
kind: Pod
metadata:
  name: {{ include "unitrack.fullname" . }}-test-connection
  labels:
    {{- include "unitrack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health
      image: curlimages/curl:8.11.1
      command:
        - sh
        - -c
        - >-
          curl -sf --retry 30 --retry-delay 2 --retry-connrefused
          http://{{ include "unitrack.fullname" . }}:{{ .Values.service.port }}/actuator/health
