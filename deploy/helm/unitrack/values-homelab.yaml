# Example overrides for the home k3s cluster (see ~/IdeaProjects/infra/k3s.md).
#
#   helm upgrade --install unitrack deploy/helm/unitrack \
#     -n unitrack --create-namespace \
#     -f deploy/helm/unitrack/values-homelab.yaml
#
# Prerequisites on the cluster:
#   - Image pushed to the Zot registry (nas1.home.int:5000) — see README.md.
#   - Pull secret created in the target namespace:
#       kubectl -n unitrack create secret docker-registry zot-regcred \
#         --docker-server=nas1.home.int:5000 \
#         --docker-username=alexm --docker-password="$ZOT_PASSWORD"

image:
  repository: nas1.home.int:5000/unitrack
  tag: "0.1.0-SNAPSHOT"
  pullPolicy: Always

imagePullSecrets:
  - name: zot-regcred

ingress:
  enabled: true
  className: traefik
  host: unitrack.lab.alexmond.org
  # Migrated 2026-06-22 from unitrack.k8s.home.int. Traefik's default TLSStore now serves a real
  # Let's Encrypt wildcard cert (*.lab.alexmond.org, via cert-manager + Cloudflare DNS-01 — see
  # infra/bin/cert-manager/), so TLS works with no per-host Secret and no client-side trust install.
  tls: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure

app:
  # Closed mode for external exposure: UI requires login, API requires a token. Pair with a
  # blanket gate (Cloudflare Access) on the UI and a service-token/bypass policy on /api so CI
  # can still publish (see docs/.../ci-recipes.adoc "Behind Cloudflare Access").
  security:
    openMode: false
    requireIngestToken: true
  notifications:
    baseUrl: https://unitrack.lab.alexmond.org

# Set a known admin password at install (don't commit it), e.g.:
#   helm upgrade --install ... --set secret.adminPassword="$UNITRACK_ADMIN_PASSWORD"
# Or leave it unset and read the generated one from the pod log on first boot:
#   kubectl -n unitrack logs deploy/unitrack | grep -i 'generated admin password'
# secret:
#   adminPassword: ""

postgresql:
  enabled: true
  persistence:
    # The default 'nfs' StorageClass (QNAP, no_root_squash since 2026-06-13) handles
    # Postgres initdb fine and lands the DB on the backed-up QNAP path. Leave unset to
    # inherit the cluster default; pin to 'local-path' only if you want node-local storage.
    storageClass: nfs
    size: 8Gi
