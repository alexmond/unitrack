# Example workflow for OTHER projects that want to report their JUnit + coverage
# results to a UniTrack server. Copy this into your repo's .github/workflows/.
#
# Prerequisites:
#   - Your build emits Surefire/JUnit XML and a coverage report (JaCoCo XML / Cobertura /
#     LCOV / OpenCover). For Maven, add the jacoco-maven-plugin 'report' goal.
#   - Set a repository variable UNITRACK_URL pointing at your UniTrack server.
#   - If the server requires an ingest token, set the UNITRACK_TOKEN secret (mint it on the
#     UniTrack profile page; an ingest-scoped token is recommended).

name: Report tests to UniTrack

on:
  push:
  pull_request:

jobs:
  test-and-report:
    # This file is a copy-paste template for OTHER repos — don't run it in UniTrack's own CI
    # (it would duplicate the real build and resolve the action against this very repo).
    if: github.repository != 'alexmond/unitrack'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Run tests; '|| true' lets us still report failures to UniTrack.
      - name: Run tests
        run: mvn -B verify || true

      # The action wraps the uploader and auto-detects project/branch/commit/build-url/PR
      # from GITHUB_*. junit/jacoco default to conventional globs — override only if needed.
      - name: Upload to UniTrack
        if: always() && vars.UNITRACK_URL != ''
        uses: alexmond/unitrack/action@v0
        with:
          url: ${{ vars.UNITRACK_URL }}
          token: ${{ secrets.UNITRACK_TOKEN }}
          # junit: '**/surefire-reports/TEST-*.xml'
          # jacoco: '**/jacoco.xml'
          # gate: "true"   # fail the build on a red quality gate
