# Example workflow for OTHER projects that want to report their JUnit + JaCoCo
# results to a UniTrack server. Copy this into your repo's .github/workflows/.
#
# Prerequisites:
#   - Your build produces Surefire XML (target/surefire-reports/TEST-*.xml)
#     and a JaCoCo XML report (target/site/jacoco/jacoco.xml).
#     For Maven, add the jacoco-maven-plugin 'report' goal to your build.
#   - Set a repository variable UNITRACK_URL pointing at your UniTrack server.

name: Report tests to UniTrack

on:
  push:
  pull_request:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Run tests; '|| true' lets us still report failures to UniTrack.
      - name: Run tests
        run: mvn -B verify || true

      - name: Upload to UniTrack
        if: always() && vars.UNITRACK_URL != ''
        env:
          UNITRACK_URL: ${{ vars.UNITRACK_URL }}
          # Set the UNITRACK_TOKEN secret if the server requires a token
          # (unitrack.security.require-ingest-token). Mint it on the UniTrack profile page.
          UNITRACK_TOKEN: ${{ secrets.UNITRACK_TOKEN }}
        run: |
          curl --fail --show-error --silent -X POST \
            ${UNITRACK_TOKEN:+-H "Authorization: Bearer ${UNITRACK_TOKEN}"} \
            -F "project=${GITHUB_REPOSITORY##*/}" \
            -F "branch=${GITHUB_REF_NAME}" \
            -F "commit=${GITHUB_SHA}" \
            -F "buildUrl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -F "repoUrl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -F "ciProvider=github-actions" \
            $(for f in target/surefire-reports/TEST-*.xml; do echo -n "-F junit=@$f "; done) \
            -F "jacoco=@target/site/jacoco/jacoco.xml;type=text/xml" \
            "${UNITRACK_URL}/api/v1/ingest"
