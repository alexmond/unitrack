name: Publish CLI image

# Builds the hermetic uploader image (JRE + unitrack-cli jar) and pushes it to GHCR.
# Fires on a version tag (v1.2.3) and can be run manually. Kept separate from ci.yml so the
# build/test pipeline stays simple.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build CLI jar
        run: ./mvnw -B -pl unitrack-cli -am -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/unitrack-uploader
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: unitrack-cli/target
          file: deploy/cli.Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
