# Core tests run against an embedded H2 in PostgreSQL mode; Hibernate creates the schema
# from the entities (Flyway migrations live in the web module).
spring.datasource.url=jdbc:h2:mem:coretest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
# Map Instant to plain TIMESTAMP (as the Flyway schema does) so projections returning
# LocalDateTime read correctly from H2.
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
