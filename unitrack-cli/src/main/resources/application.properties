# CLI: no web server, quiet framework logging so the command owns stdout.
# banner-mode=console prints the UniTrack banner (src/main/resources/banner.txt) once at
# startup; set UNITRACK_BANNER=off (or --spring.main.banner-mode=off) to silence it for piping.
spring.main.web-application-type=none
spring.main.banner-mode=${UNITRACK_BANNER:console}
logging.level.root=WARN
