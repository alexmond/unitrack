<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Sign up'">UniTrack</title></head>
<body>

<main class="container" style="max-width: 380px" layout:fragment="content">
    <h1>Create account</h1>
    <div th:if="${error}" class="empty" style="color:var(--red)" th:text="${error}">err</div>
    <form method="post" th:action="@{/signup}" style="margin-top:14px">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" th:value="${username}"
                   required autofocus/>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email <span class="muted">(optional)</span></label>
            <input type="email" id="email" name="email" class="form-control" th:value="${email}"/>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" minlength="8" required/>
            <div class="form-text muted">At least 8 characters.</div>
        </div>
        <button class="btn btn-primary" type="submit">Create account</button>
    </form>
    <p class="muted" style="margin-top:14px">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </p>
</main>
</body>
</html>
