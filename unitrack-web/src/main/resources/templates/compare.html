<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Compare runs: ' + ${project.name}">UniTrack</title></head>
<body>

<main class="container" layout:fragment="content">
    <p class="crumbs">
        <a th:href="@{/}">Projects</a> /
        <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">project</a> /
        Compare
    </p>
    <h1>Compare runs</h1>
    <p class="muted">
        base <a th:href="@{/runs/{id}(id=${cmp.base().id})}"><code class="mono"
            th:text="${cmp.base().shortSha} ?: cmp.base().id">base</code></a>
        → head <a th:href="@{/runs/{id}(id=${cmp.head().id})}"><code class="mono"
            th:text="${cmp.head().shortSha} ?: cmp.head().id">head</code></a>
    </p>

    <div class="stat-row">
        <div class="stat">
            <div class="label">Pass rate Δ</div>
            <div class="value" th:classappend="${cmp.passRateDelta() < 0} ? 'lvl-bad'"
                 th:text="${#numbers.formatDecimal(cmp.passRateDelta(),1,1)} + ' pp'">0</div>
        </div>
        <div class="stat">
            <div class="label">Coverage Δ</div>
            <div class="value" th:classappend="${cmp.coverageDelta() != null and cmp.coverageDelta() < 0} ? 'lvl-bad'"
                 th:text="${cmp.coverageDelta() != null} ? ${#numbers.formatDecimal(cmp.coverageDelta(),1,1)} + ' pp' : '—'">—</div>
        </div>
        <div class="stat">
            <div class="label">Duration Δ</div>
            <div class="value" th:classappend="${cmp.durationDeltaMs() > 0} ? 'lvl-warn'"
                 th:text="${#numbers.formatInteger(cmp.durationDeltaMs(),1)} + ' ms'">0</div>
        </div>
        <div class="stat">
            <div class="label">Newly failing</div>
            <div class="value" th:classappend="${!cmp.newlyFailing().isEmpty()} ? 'lvl-bad'"
                 th:text="${cmp.newlyFailing().size()}">0</div>
        </div>
    </div>

    <h2>Newly failing <span class="muted" th:text="'(' + ${cmp.newlyFailing().size()} + ')'">(0)</span></h2>
    <div th:if="${cmp.newlyFailing().isEmpty()}" class="empty muted">None — no regressions.</div>
    <ul th:unless="${cmp.newlyFailing().isEmpty()}">
        <li th:each="t : ${cmp.newlyFailing()}"><code class="mono" th:text="${t}">Test#m</code></li>
    </ul>

    <h2>Fixed <span class="muted" th:text="'(' + ${cmp.fixed().size()} + ')'">(0)</span></h2>
    <div th:if="${cmp.fixed().isEmpty()}" class="empty muted">None.</div>
    <ul th:unless="${cmp.fixed().isEmpty()}">
        <li th:each="t : ${cmp.fixed()}"><code class="mono" th:text="${t}">Test#m</code></li>
    </ul>

    <h2>Still failing <span class="muted" th:text="'(' + ${cmp.stillFailing().size()} + ')'">(0)</span></h2>
    <div th:if="${cmp.stillFailing().isEmpty()}" class="empty muted">None.</div>
    <ul th:unless="${cmp.stillFailing().isEmpty()}">
        <li th:each="t : ${cmp.stillFailing()}"><code class="mono" th:text="${t}">Test#m</code></li>
    </ul>
</main>
</body>
</html>
