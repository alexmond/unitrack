<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('UniTrack — Sign in')}"></head>
<body>
<header th:replace="~{fragments/common :: topbar}"></header>

<main class="container" style="max-width: 380px">
    <h1>Sign in</h1>
    <div th:if="${param.error}" class="empty" style="color:var(--red)">Invalid username or password.</div>
    <div th:if="${param.logout}" class="muted">You have been signed out.</div>
    <form method="post" th:action="@{/login}" class="rule-form"
          style="flex-direction:column; align-items:stretch; gap:10px; margin-top:14px">
        <input type="text" name="username" placeholder="Username" required autofocus/>
        <input type="password" name="password" placeholder="Password" required/>
        <button class="btn btn-muted" type="submit">Sign in</button>
    </form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
