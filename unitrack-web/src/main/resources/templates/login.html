<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Sign in'">UniTrack</title></head>
<body>

<main class="container" style="max-width: 380px" layout:fragment="content">
    <h1>Sign in</h1>
    <div th:if="${param.error}" class="empty" style="color:var(--red)">Invalid username or password.</div>
    <div th:if="${param.logout}" class="muted">You have been signed out.</div>
    <form method="post" th:action="@{/login}" style="margin-top:14px">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" required/>
        </div>
        <button class="btn btn-primary" type="submit">Sign in</button>
    </form>
</main>
</body>
</html>
