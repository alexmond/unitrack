<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Flaky tests: ' + ${project.name}">UniTrack</title></head>
<body>

<main class="container" layout:fragment="content">
    <p class="crumbs">
        <a th:href="@{/}">Projects</a> /
        <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">project</a> /
        Flaky tests
    </p>
    <h1>Flaky tests</h1>
    <nav th:replace="~{fragments/common :: subnav(${project.id}, 'flaky')}"></nav>
    <p class="muted">Tests that both passed and failed for the same commit — likely non-deterministic.</p>

    <div th:if="${flaky.isEmpty()}" class="empty">No flaky tests detected. 🎉</div>

    <table th:unless="${flaky.isEmpty()}">
        <thead>
        <tr>
            <th>Test</th>
            <th>State</th>
            <th class="num">Flaky commits</th>
            <th class="num">Failures</th>
            <th class="num">Fail rate</th>
            <th>Last failure</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${flaky}">
            <td><code class="mono" th:text="${f.displayName()}">Test#method</code></td>
            <td>
                <span class="badge"
                      th:classappend="${f.status().name() == 'QUARANTINED'} ? 'skip'
                                      : (${f.status().name() == 'RESOLVED'} ? 'pass' : 'fail')"
                      th:text="${f.status()}">ACTIVE</span>
            </td>
            <td class="num" th:text="${f.flakyCommits()}">0</td>
            <td class="num" th:text="${f.failures()} + '/' + ${f.totalResults()}">0/0</td>
            <td class="num pct" th:text="${#numbers.formatDecimal(f.failureRatePct(), 1, 1)} + '%'">0%</td>
            <td class="muted"
                th:text="${f.lastFailureAt() != null} ? ${#temporals.format(f.lastFailureAt(), 'MMM dd HH:mm')} : '—'">—</td>
            <td>
                <form method="post" th:action="@{/projects/{id}/flaky/status(id=${project.id})}">
                    <input type="hidden" name="name" th:value="${f.name()}"/>
                    <input type="hidden" name="className" th:value="${f.className()}"/>
                    <button th:if="${f.status().name() != 'QUARANTINED'}"
                            name="status" value="QUARANTINED" class="btn btn-sm btn-warning">Quarantine</button>
                    <button th:if="${f.status().name() == 'QUARANTINED'}"
                            name="status" value="ACTIVE" class="btn btn-sm btn-secondary">Un-quarantine</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
