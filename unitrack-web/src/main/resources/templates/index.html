<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Projects'">UniTrack</title></head>
<body>

<main class="container" layout:fragment="content">
    <h1>Projects</h1>
    <p class="crumbs">Test &amp; coverage tracking across your repositories.</p>

    <div th:if="${projects.isEmpty()}" class="empty">
        No projects yet. Upload results with
        <code class="mono">POST /api/v1/ingest</code> to get started.
    </div>

    <div class="cards" th:unless="${projects.isEmpty()}">
        <a class="card health-card text-reset text-decoration-none" th:each="p : ${projects}"
           th:with="run=${latest.get(p.id)}"
           th:classappend="${run == null} ? '' : (${run.status == 'PASSED'} ? 'ok' : 'bad')"
           th:href="@{/projects/{id}(id=${p.id})}">
            <div class="card-body">
                <div class="health-head">
                    <h3 th:text="${p.name}">project</h3>
                    <span th:if="${run != null}" class="badge"
                          th:classappend="${run.status == 'PASSED'} ? 'pass' : 'fail'"
                          th:text="${run.status}">PASSED</span>
                </div>
                <div class="health-stats" th:if="${run != null}">
                    <span><span class="num" th:text="${#numbers.formatDecimal(run.passRate(),1,0)} + '%'">100%</span> pass</span>
                    <span th:if="${run.lineCoveragePct != null}">
                        <span class="num" th:text="${#numbers.formatDecimal(run.lineCoveragePct,1,0)} + '%'">80%</span> cov</span>
                    <span class="muted" th:text="${runCounts.get(p.id)} + ' runs'">0 runs</span>
                </div>
                <div class="health-foot muted" th:if="${run != null}"
                     th:text="(${run.branch} ?: '—') + ' · ' + ${#temporals.format(run.createdAt, 'MMM dd HH:mm')}">main · date</div>
                <div class="meta muted" th:if="${run == null}">No runs yet</div>
            </div>
        </a>
    </div>
</main>
</body>
</html>
