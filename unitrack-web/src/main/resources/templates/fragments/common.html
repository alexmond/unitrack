<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">UniTrack</title>
    <!-- Single include point for all pages: Bootstrap first, then app.css (which bridges Bootstrap's
         --bs-* onto our theme tokens and overrides where needed). Version matches bootstrap.version in pom.xml. -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Applies the saved theme before paint (no flash); falls back to OS preference. -->
    <script th:inline="none">
        (function () {
            var root = document.documentElement;
            function icon(t) {
                var b = document.getElementById('theme-toggle');
                if (b) { b.textContent = (t === 'light' ? '☾' : '☀'); }
            }
            function apply(t) { root.setAttribute('data-theme', t); root.setAttribute('data-bs-theme', t); icon(t); }
            var saved = localStorage.getItem('theme');
            apply(saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
            window.__toggleTheme = function () {
                var t = (root.getAttribute('data-theme') === 'light') ? 'dark' : 'light';
                localStorage.setItem('theme', t);
                apply(t);
            };
            document.addEventListener('DOMContentLoaded', function () { icon(root.getAttribute('data-theme')); });
        })();
    </script>
</head>
<body>
<header th:fragment="topbar" class="topbar">
    <a class="brand" th:href="@{/}">Uni<span>Track</span></a>
    <div class="spacer"></div>
    <nav>
        <a th:href="@{/}">Projects</a>
        <a th:href="@{/actuator/health}">Health</a>
        <a th:if="${currentUser != null}" th:href="@{/profile}" th:text="${currentUser}">user</a>
        <a th:if="${currentUser == null}" th:href="@{/login}">Sign in</a>
    </nav>
    <form th:if="${currentUser != null}" method="post" th:action="@{/logout}" style="display:inline;margin-left:16px">
        <button class="theme-toggle" type="submit">Logout</button>
    </form>
    <button id="theme-toggle" class="theme-toggle" type="button"
            aria-label="Toggle light/dark theme" title="Toggle theme"
            onclick="window.__toggleTheme()">☀</button>
</header>

<nav th:fragment="subnav(projectId, active)" class="subnav" aria-label="Project sections">
    <a th:href="@{/projects/{id}(id=${projectId})}"
       th:classappend="${active == 'overview'} ? 'current'"
       th:attr="aria-current=${active == 'overview'} ? 'page' : null">
        <span aria-hidden="true">📊</span> Overview</a>
    <a th:href="@{/projects/{id}/flaky(id=${projectId})}"
       th:classappend="${active == 'flaky'} ? 'current'"
       th:attr="aria-current=${active == 'flaky'} ? 'page' : null">
        <span aria-hidden="true">🔁</span> Flaky tests</a>
    <a th:href="@{/projects/{id}/performance(id=${projectId})}"
       th:classappend="${active == 'timing'} ? 'current'"
       th:attr="aria-current=${active == 'timing'} ? 'page' : null">
        <span aria-hidden="true">⏱️</span> Test timing</a>
    <a th:href="@{/projects/{id}/perf(id=${projectId})}"
       th:classappend="${active == 'load'} ? 'current'"
       th:attr="aria-current=${active == 'load'} ? 'page' : null">
        <span aria-hidden="true">🚀</span> Load tests</a>
    <a th:href="@{/projects/{id}/clusters(id=${projectId})}"
       th:classappend="${active == 'clusters'} ? 'current'"
       th:attr="aria-current=${active == 'clusters'} ? 'page' : null">
        <span aria-hidden="true">🧩</span> Failure clusters</a>
    <span class="subnav-sep" aria-hidden="true"></span>
    <a th:href="@{/projects/{id}/triage(id=${projectId})}"
       th:classappend="${active == 'triage'} ? 'current'"
       th:attr="aria-current=${active == 'triage'} ? 'page' : null">
        <span aria-hidden="true">🏷️</span> Triage rules</a>
    <a th:href="@{/projects/{id}/settings(id=${projectId})}"
       th:classappend="${active == 'settings'} ? 'current'"
       th:attr="aria-current=${active == 'settings'} ? 'page' : null">
        <span aria-hidden="true">⚙️</span> Settings</a>
    <a th:href="@{/projects/{id}/members(id=${projectId})}"
       th:classappend="${active == 'members'} ? 'current'"
       th:attr="aria-current=${active == 'members'} ? 'page' : null">
        <span aria-hidden="true">👥</span> Members</a>
</nav>

<footer th:fragment="footer" class="footer">
    <span class="brand">Uni<span>Track</span></span>
    <span class="muted">— self-hosted test &amp; coverage tracking</span>
    <span class="spacer"></span>
    <a th:href="@{/actuator/health}">Health</a>
    <a href="https://github.com/alexmond/unitrack" rel="noopener">GitHub</a>
</footer>
</body>
</html>
