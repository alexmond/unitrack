<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- AI root-cause card, swapped in by htmx after "Analyze with AI". -->
<div th:fragment="card">
    <div th:if="${analysis != null}" class="ai-analysis" th:with="a=${analysis}">
        <div class="ai-head">
            <i class="bi bi-stars" aria-hidden="true"></i> AI root-cause
            <span class="ai-conf" th:classappend="'conf-' + ${a.confidence()}"
                  th:text="${a.confidence()} + ' confidence'">high confidence</span>
        </div>
        <p class="ai-cause" th:text="${a.rootCause()}">Likely cause…</p>
        <p class="ai-fix"><strong>Fix:</strong> <span th:text="${a.suggestion()}">Look at…</span></p>
        <div class="muted ai-model" th:text="'— generated by ' + ${a.model()}">— model</div>
    </div>
    <div th:unless="${analysis != null}" class="ai-analysis muted">AI analysis is unavailable right now.</div>
</div>
</body>
</html>
