<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>UniTrack — Operations</title></head>
<body>

<main class="container" layout:fragment="content">
    <p class="crumbs"><a th:href="@{/}">Projects</a> / Operations</p>
    <h1>Operations</h1>
    <p class="muted">One glance at how the server is doing. Refreshes automatically.</p>

    <!-- HTMX polls /ops/stats every 5s and swaps this block (which keeps the same hooks). -->
    <div th:fragment="stats" id="ops-stats" hx-get="/ops/stats" hx-trigger="every 5s" hx-swap="outerHTML">
        <div class="stat-row">
            <div class="stat"><div class="label">Projects</div>
                <div class="value" th:text="${stats.projects()}">0</div></div>
            <div class="stat"><div class="label">Runs</div>
                <div class="value" th:text="${stats.runs()}">0</div></div>
            <div class="stat"><div class="label">Pass rate</div>
                <div class="value" th:classappend="${stats.passRate() < 90} ? 'lvl-warn'"
                     th:text="${#numbers.formatDecimal(stats.passRate(),1,1)} + '%'">0%</div></div>
            <div class="stat"><div class="label">Failed runs</div>
                <div class="value" th:classappend="${stats.failed() > 0} ? 'lvl-bad'"
                     th:text="${stats.failed()}">0</div></div>
            <div class="stat"><div class="label">Live clients</div>
                <div class="value" th:text="${stats.subscribers()}">0</div></div>
        </div>

        <h2>Recent failures</h2>
        <div th:if="${failures.isEmpty()}" class="empty">No failing runs. 🎉</div>
        <table class="table table-hover align-middle" th:unless="${failures.isEmpty()}">
            <thead>
            <tr><th>When</th><th>Project</th><th>Branch</th><th>Commit</th><th>Status</th></tr>
            </thead>
            <tbody>
            <tr th:each="f : ${failures}" class="row-fail">
                <td><a th:href="@{/runs/{id}(id=${f.runId()})}"
                       th:text="${#temporals.format(f.createdAt(), 'MMM dd HH:mm')}">date</a></td>
                <td th:text="${f.project()}">project</td>
                <td th:text="${f.branch()} ?: '—'">main</td>
                <td><code class="mono" th:text="${f.shortSha()} ?: '—'">abc1234</code></td>
                <td><span class="badge fail" th:text="${f.status()}">FAILED</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<th:block layout:fragment="scripts">
    <script th:src="@{/webjars/htmx.org/2.0.4/dist/htmx.min.js}"></script>
</th:block>
</body>
</html>
