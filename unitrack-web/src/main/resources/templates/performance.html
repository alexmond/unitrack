<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title th:text="'UniTrack — ' + ${page.project.name} + ' test timing'">UniTrack</title></head>
<body>

<main class="container" layout:fragment="content">
    <p class="crumbs">
        <a th:href="@{/}">Projects</a> /
        <a th:href="@{/projects/{id}(id=${page.project.id})}" th:text="${page.project.name}">project</a> /
        <span>Test timing</span>
    </p>
    <h1 th:text="${page.project.name} + ' — test timing'">project — test timing</h1>
    <nav th:replace="~{fragments/common :: subnav(${page.project.id}, ${page.tab})}"></nav>

    <!-- Module scope chip + a way back to all (clicking a "by module" row scopes the whole page). -->
    <div th:if="${page.scoped}" style="display:flex;align-items:center;gap:10px;margin:10px 0">
        <span class="badge tag"><i class="bi bi-diagram-3" aria-hidden="true"></i>
            Module: <code class="mono" th:text="${page.selectedModule}">web</code></span>
        <a th:href="${page.allUrl}"><i class="bi bi-arrow-left" aria-hidden="true"></i> All modules</a>
    </div>

    <!-- Empty state: no timing data yet. -->
    <th:block th:unless="${page.hasRun}">
        <div th:replace="~{fragments/analytics :: emptyState(${page.empty.icon}, ${page.empty.title}, ${page.empty.message})}"></div>
    </th:block>

    <th:block th:if="${page.hasRun}">
        <!-- Shared analytics skeleton: KPI tiles → latest-run line → trend → by-module breakdown. -->
        <div th:replace="~{fragments/analytics :: kpiRow(${page.kpis})}"></div>
        <div th:replace="~{fragments/analytics :: latestRunLine(${page.latestRun})}"></div>

        <!-- Single-run state: a trend needs ≥2 runs. -->
        <p th:unless="${page.trend.present}" class="muted" style="margin-top:14px">
            First run — the suite-time trend appears once there are at least two runs.</p>

        <div th:replace="~{fragments/analytics :: trend(${page.trend.present}, ${page.trend.title}, ${page.trend.subtitle})}"></div>
        <div th:replace="~{fragments/analytics :: breakdown(${page.breakdown})}"></div>

        <!-- Slowest tests in the latest run (module-scoped), each with its change vs the previous
             run. Sortable + searchable (shared roster.js). Blue name → per-test history. -->
        <div class="trend-head" style="margin-top:34px">
            <h2 style="margin:0">Slowest tests <span class="muted" th:text="'(' + ${page.rosterSize()} + ')'">(0)</span></h2>
            <input type="search" class="form-control form-control-sm" style="max-width:280px"
                   data-roster-search="slowest-body" placeholder="Search tests…" aria-label="Search tests">
        </div>
        <table class="table table-hover align-middle sortable">
            <thead>
            <tr><th>Test</th><th>Suite</th><th class="num">Duration</th><th class="num">Δ prev</th>
                <th>Status</th><th></th></tr>
            </thead>
            <tbody id="slowest-body">
            <tr th:each="t : ${page.slowest}" th:attr="data-search=${#strings.toLowerCase(t.displayName())}">
                <td><a th:href="@{/projects/{id}/test(id=${page.project.id},className=${t.className()},name=${t.name()})}">
                    <code class="mono" th:text="${t.displayName()}">Test › method</code></a></td>
                <td class="muted" th:text="${t.suiteName()}">suite</td>
                <td class="num" th:attr="data-sort=${t.durationMs()}"
                    th:text="${#numbers.formatInteger(t.durationMs(), 1, 'COMMA')} + ' ms'">0 ms</td>
                <td class="num" th:attr="data-sort=${t.deltaMs()}">
                    <span th:if="${t.deltaMs() == null}" class="muted">new</span>
                    <span th:unless="${t.deltaMs() == null}" class="delta"
                          th:classappend="${t.deltaMs() > 0} ? 'down' : (${t.deltaMs() < 0} ? 'up' : 'flat')"
                          th:text="(${t.deltaMs() >= 0} ? '+' : '') + ${#numbers.formatInteger(t.deltaMs(), 1, 'COMMA')} + ' ms'">+0 ms</span>
                </td>
                <td><span class="badge"
                          th:classappend="${t.status() == 'PASSED'} ? 'pass' : (${t.status() == 'SKIPPED'} ? '' : 'fail')"
                          th:text="${t.status()}">PASSED</span></td>
                <td><a th:href="@{/projects/{id}/test(id=${page.project.id},className=${t.className()},name=${t.name()})}">history &rarr;</a></td>
            </tr>
            </tbody>
        </table>
        <p class="muted" data-roster-empty="slowest-body" style="display:none">No tests match your search.</p>
    </th:block>
</main>
<th:block layout:fragment="scripts">

<!-- Shared table behaviour: sortable columns, module-row drill, roster search. -->
<script th:src="@{/js/roster.js}"></script>

<!-- Suite-time + test-count trend via the shared chart (test count on a 2nd axis). -->
<script th:if="${page.trend.present}" th:src="@{/webjars/chart.js/4.4.1/dist/chart.umd.js}"></script>
<script th:if="${page.trend.present}" th:src="@{/js/trend.js}"></script>
<script th:if="${page.trend.present}" th:inline="javascript">
    window.__trendChart('trendChart', 'trendModeToggle', JSON.parse(/*[[${page.trend.configJson}]]*/ '{}'));
</script>
</th:block>
</body>
</html>
