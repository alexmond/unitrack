<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>UniTrack — Owners</title></head>
<body>

<main class="container" layout:fragment="content">
    <h1>Owner accountability</h1>
    <p class="muted">Failing tests (latest run) and flaky tests across all your projects, attributed by owner.
        Configure owner rules per project under its <em>Owners</em> tab.</p>

    <div th:if="${scorecard.isEmpty()}" class="empty muted">No failing or flaky tests to attribute.</div>
    <table class="table table-hover align-middle" th:unless="${scorecard.isEmpty()}" style="max-width:520px">
        <thead><tr><th>Owner</th><th class="num">Failing</th><th class="num">Flaky</th></tr></thead>
        <tbody>
        <tr th:each="s : ${scorecard}">
            <td>
                <span th:if="${s.owner() != null}" class="badge tag" th:text="${s.owner()}">owner</span>
                <span th:if="${s.owner() == null}" class="muted">unassigned</span>
            </td>
            <td class="num">
                <span th:if="${s.failing() > 0}" class="badge fail" th:text="${s.failing()}">0</span>
                <span th:unless="${s.failing() > 0}" class="muted">—</span>
            </td>
            <td class="num">
                <span th:if="${s.flaky() > 0}" class="badge skip" th:text="${s.flaky()}">0</span>
                <span th:unless="${s.flaky() > 0}" class="muted">—</span>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
