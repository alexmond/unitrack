<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UniTrack</title>
    <!-- Single include point for every page: Bootstrap first, then app.css (which bridges Bootstrap's
         --bs-* onto our theme tokens). Version matches bootstrap.version in pom.xml. -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Live-updates SSE client: maintains the topbar "● live" indicator and re-broadcasts
         run events as the `unitrack:run` DOM event for page scripts. -->
    <script th:src="@{/js/live.js}" defer></script>
    <!-- Applies the saved theme before paint (no flash); defaults to dark when none is saved. -->
    <script th:inline="none">
        (function () {
            var root = document.documentElement;
            window.__charts = window.__charts || [];
            // Pages create charts via window.__chart(el, cfg) so they're registered for re-tinting.
            window.__chart = function (el, cfg) {
                // Hover anywhere along a trend line to read the values for that commit (index mode),
                // instead of having to land exactly on a point. Applies to every chart.
                Chart.defaults.interaction.mode = 'index';
                Chart.defaults.interaction.intersect = false;
                Chart.defaults.plugins.tooltip.position = 'nearest';
                Chart.defaults.elements.point.hoverRadius = 5;
                Chart.defaults.elements.point.hitRadius = 8;
                var c = new Chart(el, cfg);
                window.__charts.push(c);
                return c;
            };
            function icon(t) {
                var b = document.getElementById('theme-toggle');
                if (b) { b.textContent = (t === 'light' ? '☾' : '☀'); }
            }
            // Charts bake CSS-variable colours at construct time; re-read + update them on theme change.
            function retint() {
                if (!window.__charts.length) { return; }
                var css = getComputedStyle(root);
                var muted = css.getPropertyValue('--muted').trim();
                var text = css.getPropertyValue('--text').trim();
                var grid = css.getPropertyValue('--border').trim();
                window.__charts.forEach(function (c) {
                    if (!c || !c.options) { return; }
                    var s = c.options.scales || {};
                    ['x', 'y'].forEach(function (ax) {
                        if (s[ax] && s[ax].ticks) { s[ax].ticks.color = muted; }
                        if (s[ax] && s[ax].grid) { s[ax].grid.color = grid; }
                    });
                    var lg = c.options.plugins && c.options.plugins.legend && c.options.plugins.legend.labels;
                    if (lg) { lg.color = text; }
                    c.update('none');
                });
            }
            function apply(t) { root.setAttribute('data-theme', t); root.setAttribute('data-bs-theme', t); icon(t); retint(); }
            // Dark is the default skin; only an explicit user choice (saved) switches to light.
            var saved = localStorage.getItem('theme');
            apply(saved || 'dark');
            window.__toggleTheme = function () {
                var t = (root.getAttribute('data-theme') === 'light') ? 'dark' : 'light';
                localStorage.setItem('theme', t);
                apply(t);
            };
            document.addEventListener('DOMContentLoaded', function () { icon(root.getAttribute('data-theme')); });
        })();
    </script>
</head>
<body>
<header th:replace="~{fragments/common :: topbar}"></header>
<main class="container" layout:fragment="content">
    <p>Page content.</p>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
