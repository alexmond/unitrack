<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title th:text="'UniTrack — Triage rules: ' + ${project.name}">UniTrack</title></head>
<body>

<main class="container" layout:fragment="content">
    <p class="crumbs">
        <a th:href="@{/}">Projects</a> /
        <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">project</a> /
        Triage rules
    </p>
    <h1>Triage rules</h1>
    <nav th:replace="~{fragments/common :: subnav(${project.id}, 'triage')}"></nav>
    <p class="muted">Rules categorize failures by matching the failure text (type, message, stacktrace).
        Lowest priority wins; the first match assigns the category.</p>

    <div th:if="${rules.isEmpty()}" class="empty">No rules yet — add one below.</div>
    <table th:unless="${rules.isEmpty()}">
        <thead>
        <tr><th class="num">Priority</th><th>Name</th><th>Category</th><th>Pattern</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${rules}">
            <td class="num" th:text="${r.priority()}">100</td>
            <td th:text="${r.name()}">name</td>
            <td><span class="badge" style="background:rgba(68,147,248,.15);color:var(--blue)"
                      th:text="${r.category()}">category</span></td>
            <td><code class="mono" th:text="${r.pattern()}">pattern</code></td>
            <td>
                <form method="post" th:action="@{/projects/{id}/triage/rules/{ruleId}/delete(id=${project.id},ruleId=${r.id()})}">
                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h2>Add rule</h2>
    <form method="post" th:action="@{/projects/{id}/triage/rules(id=${project.id})}"
          class="d-flex flex-wrap gap-2 align-items-center">
        <input type="text" name="name" class="form-control" style="width:auto;flex:1 1 9rem"
               aria-label="Rule name" placeholder="Name (e.g. OOM)" required/>
        <input type="text" name="category" class="form-control" style="width:auto;flex:1 1 11rem"
               aria-label="Category" placeholder="Category (e.g. INFRASTRUCTURE)" required/>
        <input type="text" name="pattern" class="form-control" style="width:auto;flex:1 1 13rem"
               aria-label="Pattern / regex" placeholder="Pattern / regex (e.g. OutOfMemoryError)" required/>
        <input type="number" name="priority" class="form-control" style="width:6rem"
               aria-label="Priority" placeholder="Priority" value="100"/>
        <button class="btn btn-primary" type="submit">Add</button>
    </form>
</main>
</body>
</html>
