<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="UniTrack">
  <!-- UniTrack favicon: a trend line "tracked" over time along a baseline track.
       Blue accent (#4493f8) matches the "Track" half of the wordmark; dark tile
       matches the app's default theme (bg #0f1419, border #2c343d, rounded). -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2027"/>
      <stop offset="1" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7fe0"/>
      <stop offset="1" stop-color="#4493f8"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#tile)" stroke="#2c343d"/>

  <!-- baseline "track" -->
  <line x1="6" y1="24" x2="26" y2="24" stroke="#2c343d" stroke-width="1.5" stroke-linecap="round"/>

  <!-- trend line: dip then climb -->
  <polyline points="6,19 12,21 18,13 26,7" fill="none" stroke="url(#line)"
            stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- tracked run points -->
  <circle cx="6"  cy="19" r="1.7" fill="#4493f8"/>
  <circle cx="12" cy="21" r="1.7" fill="#4493f8"/>
  <circle cx="18" cy="13" r="1.7" fill="#4493f8"/>
  <!-- latest run, emphasized -->
  <circle cx="26" cy="7" r="3.4" fill="#4493f8" opacity="0.25"/>
  <circle cx="26" cy="7" r="1.9" fill="#7cb2fb"/>
</svg>
