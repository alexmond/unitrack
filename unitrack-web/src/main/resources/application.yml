spring:
  application:
    name: unitrack

  datasource:
    url: ${UNITRACK_DB_URL:jdbc:postgresql://localhost:5432/unitrack}
    username: ${UNITRACK_DB_USER:unitrack}
    password: ${UNITRACK_DB_PASSWORD:unitrack}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB

  ai:
    mcp:
      server:
        name: unitrack
        version: 0.1.0
        instructions: >-
          UniTrack exposes read-only tools to inspect JUnit test results, code coverage,
          flaky tests, failure clusters and quality gates. Call listProjects first to
          discover project names/ids, then drill into runs by id.

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.alexmond.unitrack: INFO
