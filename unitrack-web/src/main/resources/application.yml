spring:
  application:
    name: unitrack

  # Grace window for in-flight requests on shutdown (pairs with server.shutdown: graceful).
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${UNITRACK_DB_URL:jdbc:postgresql://localhost:5432/unitrack}
    username: ${UNITRACK_DB_USER:unitrack}
    password: ${UNITRACK_DB_PASSWORD:unitrack}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          # Batch the many same-type inserts an ingest emits (test cases, coverage files) into
          # multi-row JDBC batches — one ingest can persist hundreds of rows, and un-batched that
          # is a network round-trip each on Postgres. order_inserts groups them by type so the
          # batch isn't broken up. (#314-class: dev H2 is in-process so this shows on Postgres.)
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true

  # Cache deterministic per-run read results (gate, regression, diffs, blame) — see #280.
  # Caffeine: bounded + a short write-TTL backstop; merges evict the affected run explicitly.
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=10m

  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB

  ai:
    # In-app AI failure analysis (#346) via Spring AI's Anthropic ChatClient. **Off by default** —
    # bring-your-own-key: with no api-key the AiAnalyzer reports disabled and never calls an LLM
    # (the ChatModel bean is still published with a blank key, which is inert). Cost-controlled:
    # analysed once per failure signature, cached. Set UNITRACK_AI_API_KEY to enable.
    anthropic:
      api-key: ${UNITRACK_AI_API_KEY:}
      chat:
        options:
          model: ${UNITRACK_AI_MODEL:claude-sonnet-4-6}
    mcp:
      server:
        name: unitrack
        version: 0.1.0
        instructions: >-
          UniTrack exposes read-only tools to inspect JUnit test results, code coverage,
          flaky tests, failure clusters and quality gates. Call listProjects first to
          discover project names/ids, then drill into runs by id.

server:
  port: ${PORT:8080}
  # Public-facing: never leak stack traces / exception messages / binding errors to clients.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
  # Let in-flight ingests finish when the process is told to stop (e.g. a Kubernetes
  # rolling update sends SIGTERM); Spring stops accepting new requests, then drains.
  shutdown: graceful
  tomcat:
    # Tomcat 11 (Spring Boot 4) caps a multipart request at 10 parts by default. An ingest
    # sends one part per report file — a normal suite easily has dozens of JUnit XMLs in a
    # single request — so the default rejects them with "Maximum upload size exceeded". Raise
    # it well above any real suite (the CLI shards by size, not count, so one request can
    # carry many small files).
    max-part-count: 10000

management:
  server:
    # Actuator runs on its own port so it is NOT reachable through the public app port / ingress
    # (health, metrics, prometheus, env stay internal). The chart points probes + the prometheus
    # scrape at this port and exposes only the app port on the Service. Set MANAGEMENT_PORT=8080 to
    # fold it back onto the app port for a simple all-in-one local run.
    port: ${MANAGEMENT_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    # Expose info.* (app metadata below) and the generated build-info on /actuator/info.
    env:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
      # The /status UI page renders the aggregated health, so surface components and
      # their details to the health endpoint (this is an internal self-hosted dashboard).
      show-components: always
      show-details: always

# Static app metadata for /actuator/info (alongside the generated build-info).
info:
  app:
    name: UniTrack
    description: Self-hosted JUnit test + multi-language coverage tracking
    component: unitrack-web

unitrack:
  # Ingest size guards — hard caps on the DECOMPRESSED bytes of a single uploaded part, so a
  # pathologically large (or gzip-bombed) report fails fast with a clear message instead of
  # OOM-ing the process. Reports are still DOM/full-document parsed, so their cap is sized to
  # the heap; perf logs stream into a bounded histogram, so theirs is a generous backstop. Set
  # either to 0 to disable.
  ingest:
    max-report-bytes: ${UNITRACK_INGEST_MAX_REPORT_BYTES:256MB}
    max-perf-bytes: ${UNITRACK_INGEST_MAX_PERF_BYTES:1GB}
    # Async ingest (POST /api/v1/ingest?async=true): bounded worker pool + queue. Once both
    # are full, a new async upload is rejected with 429. Synchronous ingest is unaffected.
    async-pool-size: ${UNITRACK_INGEST_ASYNC_POOL_SIZE:2}
    async-queue-capacity: ${UNITRACK_INGEST_ASYNC_QUEUE_CAPACITY:20}
  notifications:
    enabled: ${UNITRACK_NOTIFICATIONS_ENABLED:false}
    from-address: ${UNITRACK_MAIL_FROM:unitrack@localhost}
    base-url: ${UNITRACK_BASE_URL:http://localhost:8080}
  # Which branches the Overview picker surfaces by default. Ephemeral PR/feature branches
  # (deleted after merge) otherwise pile up forever, since branches come from run history.
  # Patterns are globs (* = any chars) — adjust to your naming convention.
  branches:
    protected-patterns: ${UNITRACK_BRANCHES_PROTECTED:main,master,develop,trunk,release/*,hotfix/*}
    active-days: ${UNITRACK_BRANCHES_ACTIVE_DAYS:30}
  # Per-project alert-channel delivery (notify4j). Async keeps a slow Slack/webhook off the
  # ingest thread; transient 5xx/429/IO failures retry. Per-channel delivery counters
  # (notify4j.notifications{channel,outcome}) surface in /actuator/prometheus.
  alerts:
    delivery:
      pool-size: ${UNITRACK_ALERTS_POOL_SIZE:4}
      connect-timeout: 5s
      read-timeout: 10s
      max-attempts: 3      # 1 disables retry
      retry-backoff: 500ms

# To actually deliver mail, configure an SMTP server, e.g.:
#   spring.mail.host: smtp.example.com
#   spring.mail.port: 587
#   spring.mail.username / spring.mail.password
# Without spring.mail.host no JavaMailSender is created and notifications stay disabled.

logging:
  level:
    org.alexmond.unitrack: INFO
