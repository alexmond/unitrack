spring:
  datasource:
    url: jdbc:h2:mem:unitrack;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true

  docker:
    compose:
      enabled: false

unitrack:
  security:
    admin-password: testadmin
    # Most integration tests ingest then read anonymously; keep auto-created projects public
    # so those keep working. The visibility feature itself is tested with explicit PRIVATE projects.
    default-visibility: PUBLIC
