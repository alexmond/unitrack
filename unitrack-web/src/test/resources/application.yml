spring:
  # Mirror the config-client import-check disable from the main application.yml (the test config
  # shadows it): spring-cloud-starter-config is on the classpath, so without this the context fails
  # to start with "No spring.config.import property has been defined" (tests have no config server).
  cloud:
    config:
      import-check:
        enabled: false

  datasource:
    url: jdbc:h2:mem:unitrack;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true

  docker:
    compose:
      enabled: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB

# Mirror the multipart part-count cap from the main application.yml (the test config shadows it):
# Tomcat 11 defaults to 10 parts per request, which rejects a normal multi-file ingest.
server:
  tomcat:
    max-part-count: 10000

# Mirror the actuator exposure from the main application.yml (the test config shadows it).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-components: always
      show-details: always

info:
  app:
    name: UniTrack
    description: Self-hosted JUnit test + multi-language coverage tracking
    component: unitrack-web

unitrack:
  security:
    admin-password: testadmin
    # Most integration tests ingest then read anonymously; keep auto-created projects public
    # so those keep working. The visibility feature itself is tested with explicit PRIVATE projects.
    default-visibility: PUBLIC
